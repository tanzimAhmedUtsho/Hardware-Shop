<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Tanzim Hardware</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="call.css" />
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div
      class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-100"
      id="contactCard"
    >
      <div class="bg-blue-900 p-8 text-white text-center relative">
        <a
          href="../index.html"
          class="absolute left-5 top-5 text-gray-300 hover:text-white transition"
        >
          <i class="fas fa-arrow-left"></i> ফিরে যান
        </a>
        <div
          class="w-20 h-20 bg-yellow-400 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg"
        >
          <i class="fas fa-phone-alt text-blue-900 text-3xl animate-bounce"></i>
        </div>
        <h2 class="text-3xl font-bold italic">সরাসরি যোগাযোগ</h2>
        <p class="text-blue-200 mt-2">আমরা আপনাকে কল ব্যাক করবো</p>
      </div>

      <div class="p-8">
        <div id="formWrapper">
          <form id="callForm" class="space-y-5">
            <div class="group">
              <label class="block text-sm font-bold text-gray-700 mb-2"
                >আপনার নাম</label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
                >
                  <i class="fas fa-user"></i>
                </span>
                <input
                  type="text"
                  id="name"
                  required
                  class="form-input w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none transition"
                  placeholder="তানজিম আহমেদ"
                />
              </div>
            </div>

            <div class="group">
              <label class="block text-sm font-bold text-gray-700 mb-2"
                >ফোন নম্বর</label
              >
              <div class="relative">
                <span
                  class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
                >
                  <i class="fas fa-mobile-alt"></i>
                </span>
                <input
                  type="tel"
                  id="phone"
                  required
                  class="form-input w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none transition"
                  placeholder="০১XXXXXXXXX"
                />
              </div>
            </div>

            <button
              type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center space-x-2"
            >
              <span>কল রিকোয়েস্ট পাঠান</span>
              <i class="fas fa-paper-plane"></i>
            </button>
          </form>

          <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-gray-500">অথবা সরাসরি আমাদের কল করুন</p>
            <a
              href="tel:01700000000"
              class="text-2xl font-black text-blue-900 hover:text-blue-700 transition"
              >০১XXX-XXXXXX</a
            >
          </div>
        </div>

        <div id="successState" class="hidden text-center py-6 animate-fade-in">
          <div
            class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6"
          >
            <i class="fas fa-check text-4xl"></i>
          </div>
          <h3 class="text-2xl font-bold text-gray-800 mb-2" id="thanksMsg">
            ধন্যবাদ!
          </h3>
          <p class="text-gray-600">
            আপনার রিকোয়েস্টটি সফলভাবে জমা হয়েছে। দ্রুত আপনার সাথে যোগাযোগ করা
            হবে।
          </p>
          <button
            onclick="window.location.href = '../index.html'"
            class="mt-8 text-blue-600 font-bold hover:underline"
          >
            হোম পেজে ফিরে যান
          </button>
        </div>
      </div>
    </div>

    <script src="call.js"></script>
  </body>
</html>
