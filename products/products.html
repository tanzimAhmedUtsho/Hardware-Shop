<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>আমাদের পণ্যসমূহ - Tanzim Hardware</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="products.css" />
  </head>
  <body class="bg-gray-50 flex flex-col min-h-screen">
    <header class="bg-blue-900 text-white shadow-md sticky top-0 z-50">
      <div
        class="container mx-auto px-4 py-4 flex justify-between items-center"
      >
        <div class="flex items-center space-x-4">
          <a
            href="../index.html"
            class="text-xl font-bold tracking-wider hover:text-yellow-400 transition"
          >
            <i class="fas fa-arrow-left mr-2"></i> TANZIM HARDWARE
          </a>
        </div>

        <div class="relative w-1/3 md:w-1/3 hidden sm:block">
          <input
            type="text"
            id="searchInput"
            placeholder="পণ্য খুঁজুন..."
            class="w-full bg-blue-800 text-white px-4 py-2 rounded-full border border-blue-700 outline-none focus:border-yellow-400 placeholder-blue-300 transition"
          />
          <i class="fas fa-search absolute right-4 top-3 text-blue-300"></i>
        </div>

        <button
          id="cartToggle"
          class="relative bg-yellow-500 text-blue-900 p-3 rounded-full hover:bg-yellow-400 transition shadow-lg"
        >
          <i class="fas fa-shopping-cart text-xl"></i>
          <span
            id="cartCount"
            class="absolute -top-2 -right-2 bg-red-600 text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full border-2 border-white"
            >0</span
          >
        </button>
      </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-10">
      <div class="text-center mb-12">
        <h2 class="text-3xl md:text-4xl font-black text-blue-900 mb-4 italic">
          আমাদের সংগ্রহে যা আছে
        </h2>
        <div
          class="h-1.5 w-24 bg-yellow-500 mx-auto rounded-full shadow-sm"
        ></div>
        <p class="mt-4 text-gray-600 font-medium">
          ২০টি সেরা মানের হার্ডওয়্যার সরঞ্জাম আপনার জন্য
        </p>
      </div>

      <div
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"
        id="productGrid"
      ></div>

      <div id="noProduct" class="hidden text-center py-20">
        <i class="fas fa-search text-5xl text-gray-300 mb-4"></i>
        <p class="text-xl text-gray-500">
          দুঃখিত, এই নামে কোনো পণ্য পাওয়া যায়নি!
        </p>
      </div>
    </main>

    <!-- Cart Sidebar -->
    <div
      id="cartSidebar"
      class="fixed inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] flex flex-col"
    >
      <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
        <h3 class="text-xl font-bold">
          <i class="fas fa-shopping-basket mr-2"></i> আপনার কার্ট
        </h3>
        <button id="closeCart" class="text-2xl hover:text-yellow-400">
          &times;
        </button>
      </div>

      <div id="cartItems" class="flex-grow overflow-y-auto p-4 space-y-4">
        <!-- Cart items will be injected here -->
      </div>

      <div class="p-6 border-t border-gray-100 bg-gray-50">
        <div class="flex justify-between items-center mb-6">
          <span class="text-gray-600 font-bold">মোট টাকা:</span>
          <span id="cartTotal" class="text-2xl font-black text-blue-900"
            >৳ ০</span
          >
        </div>
        <a
          href="../Call_Korun/call.html"
          class="block w-full bg-blue-600 text-white text-center font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg"
        >
          অর্ডার কনফার্ম করুন
        </a>
      </div>
    </div>
    <div
      id="cartOverlay"
      class="fixed inset-0 bg-black opacity-50 z-[55] hidden"
    ></div>

    <footer class="bg-gray-900 py-8 mt-12 border-t-4 border-yellow-500">
      <div class="container mx-auto px-4 text-center">
        <p class="text-white font-bold mb-2 italic">
          তানজিম হার্ডওয়্যার এন্ড টুলস
        </p>
        <p class="text-gray-400 text-sm italic">
          &copy; ২০২২ - ২০২৬ তানজিম আহমেদ। সর্বস্বত্ব সংরক্ষিত।
        </p>
      </div>
    </footer>

    <script src="products.js"></script>
  </body>
</html>
